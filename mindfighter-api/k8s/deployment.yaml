apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindfighter-api
  labels:
    app: mindfighter-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mindfighter-api
  template:
    metadata:
      labels:
        app: mindfighter-api
    spec:
      containers:
      - name: mindfighter-api
        image: khalilabdulrahimentrepreneur-commits/mindfighter-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DEBUG
          value: "False"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mindfighter-api-service
spec:
  selector:
    app: mindfighter-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer